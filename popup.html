<!doctype html>
<meta charset="utf-8" />
<style>
  :root {
    color-scheme: light dark;
    --accent1: #3d8bff; --accent2: #a855f7; /* matches the sparkle icon */
    --border: light-dark(#ddd, #444);
    --muted: light-dark(#777, #999);
  }
  body {
    font: 13px/1.4 system-ui; width: 320px; margin: 0; padding: 16px;
    display: flex; flex-direction: column; gap: 14px;
    background: light-dark(#fff, #202124);
  }
  header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  h1 { font-size: 15px; margin: 0; }
  h1 .grad {
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  #sponsor {
    display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
    padding: 5px 11px; border-radius: 999px; font-weight: 600; font-size: 12px;
    color: light-dark(#c2185b, #ff8fb3);
    border: 1px solid light-dark(#f3c1d3, #7a3b52);
    background: light-dark(#fdf0f5, #3a2530);
    transition: transform .12s, box-shadow .12s;
  }
  #sponsor:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(216, 27, 96, .25); }
  .label { font-weight: 600; margin-bottom: 5px; }
  #providers {
    display: flex; gap: 4px; padding: 4px; border-radius: 12px;
    border: 1px solid var(--border); background: light-dark(#f6f6f6, #2b2c2f);
  }
  #providers button {
    flex: 1; padding: 7px 0; font: inherit; cursor: pointer;
    border: none; border-radius: 9px; background: transparent; color: inherit;
    transition: background .12s;
  }
  #providers button:hover { background: light-dark(#ebebeb, #38393c); }
  #providers button.active {
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    color: #fff; font-weight: 600;
  }
  textarea {
    width: 100%; box-sizing: border-box; height: 90px; resize: vertical;
    font: inherit; padding: 9px 10px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent; color: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent1); }
  .preview {
    border: 1px dashed var(--border); border-radius: 10px; padding: 9px 11px;
    font-family: ui-monospace, Consolas, monospace; font-size: 12px;
    color: var(--muted); white-space: pre-wrap;
    background: light-dark(#fafafa, #26272a);
  }
  .hint { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .row { display: flex; align-items: center; gap: 7px; font-weight: 400; cursor: pointer; }
  .row input { accent-color: var(--accent2); }
  #saved { color: light-dark(#188038, #81c995); visibility: hidden; font-size: 12px; }
</style>

<header>
  <h1><span class="grad">✦</span> Transcript to AI</h1>
  <a id="sponsor" href="https://github.com/sponsors/HamzaYslmn" target="_blank">❤️ Sponsor</a>
</header>

<div>
  <div class="label">AI provider</div>
  <div id="providers">
    <button data-provider="Claude">Claude</button>
    <button data-provider="ChatGPT">ChatGPT</button>
    <button data-provider="Gemini">Gemini</button>
  </div>
</div>

<div>
  <div class="label">Prompt</div>
  <textarea id="prompt" placeholder="Leave empty to send only the transcript and type your prompt in the chat later."></textarea>
</div>

<label class="row"><input type="checkbox" id="desc" /> Include video description</label>

<div>
  <div class="label">Message format</div>
  <div class="preview" id="preview"></div>
  <div class="hint">Empty prompt → only the transcript is sent.</div>
</div>

<div id="saved">Saved ✓</div>
<script src="popup.js"></script>
