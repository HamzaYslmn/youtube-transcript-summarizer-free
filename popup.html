<!doctype html>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light dark; }
  body {
    font: 13px/1.4 system-ui; width: 300px; margin: 0; padding: 14px;
    display: flex; flex-direction: column; gap: 12px;
  }
  h1 { font-size: 14px; margin: 0; }
  .label { font-weight: 600; margin-bottom: 4px; }
  #providers { display: flex; gap: 6px; }
  #providers button {
    flex: 1; padding: 7px 0; font: inherit; cursor: pointer;
    border: 1px solid light-dark(#ccc, #555); border-radius: 8px;
    background: light-dark(#f5f5f5, #333); color: inherit;
  }
  #providers button.active {
    background: light-dark(#1a73e8, #8ab4f8); color: light-dark(#fff, #202124);
    border-color: transparent; font-weight: 600;
  }
  textarea {
    width: 100%; box-sizing: border-box; height: 90px; resize: vertical;
    font: inherit; padding: 8px; border-radius: 8px;
    border: 1px solid light-dark(#ccc, #555); background: transparent; color: inherit;
  }
  .preview {
    border: 1px dashed light-dark(#bbb, #666); border-radius: 8px; padding: 8px 10px;
    font-family: ui-monospace, Consolas, monospace; font-size: 12px;
    color: light-dark(#555, #aaa); white-space: pre-wrap;
  }
  .hint { color: light-dark(#777, #999); font-size: 12px; }
  .row { display: flex; flex-direction: row; align-items: center; gap: 6px; font-weight: 400; cursor: pointer; }
  #saved { color: light-dark(#188038, #81c995); visibility: hidden; font-size: 12px; }
</style>

<h1>YouTube Transcript to AI</h1>

<div>
  <div class="label">AI provider</div>
  <div id="providers">
    <button data-provider="Claude">Claude</button>
    <button data-provider="ChatGPT">ChatGPT</button>
    <button data-provider="Gemini">Gemini</button>
  </div>
</div>

<div>
  <div class="label">Prompt</div>
  <textarea id="prompt" placeholder="Leave empty to send only the transcript and type your prompt in the chat later."></textarea>
</div>

<label class="row"><input type="checkbox" id="desc" /> Include video description</label>

<div>
  <div class="label">Message format</div>
  <div class="preview" id="preview"></div>
  <div class="hint">Empty prompt → only the transcript is sent.</div>
</div>

<div id="saved">Saved ✓</div>
<script src="popup.js"></script>
